<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Note AI - Premium HUD Playground</title>
    <!-- Importando React e ReactDOM de CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Premium / Dark Mode */
            --bg-env: #09090b;
            --hud-bg: rgba(24, 24, 27, 0.65);
            --hud-border: rgba(255, 255, 255, 0.08);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.4);

            /* Cores de Estado Sofisticadas */
            --state-idle: rgba(255, 255, 255, 0.3);
            --state-listen: #38bdf8; /* Sky Blue suave */
            --state-listen-glow: rgba(56, 189, 248, 0.25);
            --state-finalizing: #fbbf24; /* Amber */
            --state-finalizing-glow: rgba(251, 191, 36, 0.2);
            --state-injecting: #a855f7; /* Purple */
            --state-injecting-glow: rgba(168, 85, 247, 0.25);
            --state-success: #10b981; /* Emerald */
            --state-success-glow: rgba(16, 185, 129, 0.2);
            --state-error: #f43f5e; /* Rose */
            --state-error-glow: rgba(244, 63, 94, 0.2);

            --shadow-glass: 0 4px 16px rgba(0, 0, 0, 0.25);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 50% 0%, #1f1f22 0%, var(--bg-env) 100%);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Controles do Playground --- */
        .controls {
            position: absolute;
            top: 30px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 100px;
            border: 1px solid var(--hud-border);
        }
        button {
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        button.active { background: var(--text-main); color: #000; }

        /* --- HUD Premium CSS --- */
        .hud-root {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .hud-stage {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hud-frame {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* O Pill principal: Físicamente Elástico e Alinhado à Esquerda internamente */
        .hud-pill {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start; /* Essencial: trava o ícone à esquerda na expansão */
            border-radius: 100px;
            will-change: transform, padding, box-shadow;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);

            box-sizing: border-box;
            height: 38px;
            padding: 0 4px; /* Idle padding - Mantém 4px simétricos */
            width: auto; /* A largura é ditada pelo conteúdo interno */

            background: var(--hud-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--hud-border);
            box-shadow: var(--shadow-glass), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .hud-pill.state-idle:not(.expanded) {
            transform: scale(0.95);
            opacity: 0.8;
            animation: breathe-premium 4s ease-in-out infinite alternate;
        }

        .hud-pill.expanded, .hud-pill.hovered {
            padding: 0 14px 0 4px; /* Expande apenas o lado direito */
            transform: scale(1);
            opacity: 1;
        }

        /* Cores de Borda e Glow Dinâmicos baseados no estado */
        .hud-pill.state-listening { border-color: rgba(56, 189, 248, 0.25); box-shadow: 0 0 16px var(--state-listen-glow), inset 0 0 8px var(--state-listen-glow), var(--shadow-glass); }
        .hud-pill.state-finalizing { border-color: rgba(251, 191, 36, 0.25); box-shadow: 0 0 16px var(--state-finalizing-glow), var(--shadow-glass); }
        .hud-pill.state-injecting { border-color: rgba(168, 85, 247, 0.25); box-shadow: 0 0 16px var(--state-injecting-glow), var(--shadow-glass); }
        .hud-pill.state-success { border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 0 16px var(--state-success-glow), var(--shadow-glass); }
        .hud-pill.state-error { border-color: rgba(244, 63, 94, 0.3); box-shadow: 0 0 16px var(--state-error-glow), var(--shadow-glass); animation: shake-premium 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

        @keyframes breathe-premium {
            0% { transform: scale(0.95); border-color: rgba(255,255,255,0.04); }
            100% { transform: scale(0.97); border-color: rgba(255,255,255,0.1); }
        }

        @keyframes shake-premium {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }

        /* O wrapper empurra o container de dentro para fora usando max-width */
        .pill-content-wrapper {
            display: flex;
            align-items: center;
            overflow: hidden;
            max-width: 0; /* Começa retraído */
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            white-space: nowrap; /* Impede quebra de linha na expansão */
        }

        .hud-pill.expanded .pill-content-wrapper {
            max-width: 180px; /* Limite elástico, o tamanho real respeitará o texto */
            opacity: 1;
            transform: translateX(0);
        }

        /* --- Ícones e Indicadores --- */
        .hud-mic-container {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            flex-shrink: 0; /* Impede esmagamento do ícone */
            background: transparent;
        }

        .hud-pill.expanded .hud-mic-container {
            background: rgba(255, 255, 255, 0.05);
        }

        .hud-mic {
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.95);
        }

        /* --- Símbolo da Marca Animado --- */
        .brand-svg {
            --brand-ring-base: rgba(56, 189, 248, 0.6);
            --brand-ring-anim: transparent; /* Invisível no IDLE */
            --brand-mic: rgba(255, 255, 255, 0.9);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: visible;
        }

        .brand-ring-base {
            transition: stroke 0.4s;
        }

        .brand-ring-anim {
            transition: stroke 0.4s, stroke-dasharray 0.3s;
            transform-origin: center;
        }

        .state-listening .hud-mic-container { background: rgba(56, 189, 248, 0.05); }
        .state-success .hud-mic-container { background: rgba(16, 185, 129, 0.15); }
        .state-error .hud-mic-container { background: rgba(244, 63, 94, 0.15); }

        /* Em estados de ação, o anel base fica sutil (trilho) e a animação ganha destaque */
        .state-listening .brand-svg {
            --brand-ring-base: rgba(56, 189, 248, 0.15);
            --brand-ring-anim: var(--state-listen);
            --brand-mic: #ffffff;
            filter: drop-shadow(0 0 4px var(--state-listen-glow));
        }
        .state-finalizing .brand-svg {
            --brand-ring-base: rgba(251, 191, 36, 0.15);
            --brand-ring-anim: var(--state-finalizing);
            --brand-mic: #ffffff;
        }
        .state-injecting .brand-svg {
            --brand-ring-base: rgba(168, 85, 247, 0.15);
            --brand-ring-anim: var(--state-injecting);
            --brand-mic: #ffffff;
        }
        .state-success .brand-svg {
            --brand-ring-base: var(--state-success);
            --brand-ring-anim: transparent;
            --brand-mic: var(--state-success);
        }
        .state-error .brand-svg {
            --brand-ring-base: var(--state-error);
            --brand-ring-anim: transparent;
            --brand-mic: var(--state-error);
        }

        /* Tamanho do traço animado (comprimento e lacuna) calculados para r=11 (perímetro ~69) */
        .ring-listening { stroke-dasharray: 24 60; animation: spin-ring 1s linear infinite; }
        .ring-finalizing { stroke-dasharray: 12 60; animation: spin-ring 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .ring-injecting { stroke-dasharray: 36 36; animation: spin-ring 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }

        @keyframes spin-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Tipografia Embutida --- */
        .hud-label-compact {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: var(--text-main);
            transition: color 0.3s ease;
            margin-left: 8px; /* Espaço após o ícone */
        }

        .state-listening .hud-label-compact { color: var(--state-listen); text-shadow: 0 0 8px var(--state-listen-glow); }
        .state-finalizing .hud-label-compact { color: var(--state-finalizing); }
        .state-injecting .hud-label-compact { color: var(--state-injecting); }
        .state-success .hud-label-compact { color: var(--state-success); }
        .state-error .hud-label-compact { color: var(--state-error); }

        /* --- Visualizador EQ --- */
        .hud-wave-canvas {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 65px;
            gap: 2px;
            height: 16px;
            margin-left: 8px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Retrai o EQ suavemente nos estados finais */
        .state-success .hud-wave-canvas,
        .state-error .hud-wave-canvas {
            width: 0;
            margin-left: 0;
            opacity: 0;
        }

        .hud-wave-bar {
            width: 2.5px;
            border-radius: 3px;
            transition: height 0.08s linear, background-color 0.4s ease, opacity 0.3s ease;
            min-height: 2px;
        }
    </style>
</head>
<body>

    <div class="controls" id="btn-container"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COL_COUNT = 14;
        const CURVE_PROFILE = Array.from({ length: COL_COUNT }, (_, i) => Math.sin((i / (COL_COUNT - 1)) * Math.PI));

        function IconMic({ state }) {
            let innerContent;

            if (state === 'success') {
                innerContent = <polyline points="8 12 11 15 16 9" stroke="var(--brand-mic)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />;
            } else if (state === 'error') {
                innerContent = (
                    <g stroke="var(--brand-mic)" strokeWidth="2" strokeLinecap="round">
                        <line x1="9" y1="9" x2="15" y2="15" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                    </g>
                );
            } else if (state === 'injecting') {
                innerContent = (
                    <g stroke="var(--brand-mic)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none">
                        <polyline points="10 7 10 11 15 11" />
                        <path d="M10 7H7a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-4" />
                    </g>
                );
            } else {
                innerContent = (
                    <g>
                        <rect x="9.5" y="6" width="5" height="7" rx="2.5" fill="var(--brand-mic)" />
                        <path d="M7 12.5v0.5a5 5 0 0 0 10 0v-0.5" stroke="var(--brand-mic)" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                        <path d="M12 18v3M9 21h6" stroke="var(--brand-mic)" strokeWidth="1.5" strokeLinecap="round" />
                    </g>
                );
            }

            return (
                <svg width="20" height="20" viewBox="0 0 24 24" className="brand-svg">
                    {/* Anel base: Mantém a borda original sempre visível */}
                    <circle cx="12" cy="12" r="11" stroke="var(--brand-ring-base)" strokeWidth="1.8" fill="none" className="brand-ring-base" />

                    {/* Anel animado: Gira pontualmente por cima da borda base com pontas arredondadas */}
                    <circle cx="12" cy="12" r="11" stroke="var(--brand-ring-anim)" strokeWidth="1.8" fill="none" className={`brand-ring-anim ring-${state}`} strokeLinecap="round" />

                    <g style={{ transition: 'all 0.3s ease' }}>{innerContent}</g>
                </svg>
            );
        }

        function resolveBarColor(state, level) {
            if (state === 'idle') return 'rgba(255,255,255,0.15)';
            if (state === 'listening') return `rgba(56, 189, 248, ${Math.min(1, 0.4 + level)})`;
            if (state === 'finalizing') return 'var(--state-finalizing)';
            if (state === 'injecting') return 'var(--state-injecting)';
            if (state === 'success') return 'var(--state-success)';
            return 'var(--state-error)';
        }

        function Visualizer({ state }) {
            const [levels, setLevels] = useState(() => Array(COL_COUNT).fill(0.1));

            useEffect(() => {
                let rafId;
                const tick = () => {
                    const now = performance.now() / 1000;
                    setLevels(prev => prev.map((curr, i) => {
                        let target = 0.1;
                        if (state === 'listening') {
                            const noise1 = Math.sin(now * 8 + i * 0.5) * 0.3;
                            const noise2 = Math.cos(now * 12 - i * 0.3) * 0.2;
                            target = Math.max(0.1, Math.max(0, (0.5 + noise1 + noise2)) * CURVE_PROFILE[i]);
                        } else if (state === 'finalizing' || state === 'injecting') {
                            const speed = state === 'injecting' ? 10 : 6;
                            const active = Math.max(0, 1 - Math.abs(((Math.sin(now * speed) + 1) / 2) - (i / (COL_COUNT - 1))) * 5);
                            target = 0.15 + (active * 0.6 * CURVE_PROFILE[i]);
                        } else if (state === 'success' || state === 'error') {
                            target = 0.1;
                        } else {
                            target = 0.1 + ((Math.sin(now * 2) * 0.05 + 0.05) * CURVE_PROFILE[i]);
                        }
                        return curr + (target - curr) * 0.25;
                    }));
                    rafId = requestAnimationFrame(tick);
                };
                rafId = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(rafId);
            }, [state]);

            return (
                <div className="hud-wave-canvas">
                    {levels.map((level, i) => (
                        <div key={i} className="hud-wave-bar" style={{
                            height: `${Math.max(3, level * 16)}px`,
                            backgroundColor: resolveBarColor(state, level),
                            opacity: (state === 'success' || state === 'error') ? 0 : 1
                        }} />
                    ))}
                </div>
            );
        }

        function App() {
            const [state, setState] = useState('idle');
            const [isHovered, setIsHovered] = useState(false);

            const renderControls = () => {
                const states = ['idle', 'listening', 'finalizing', 'injecting', 'success', 'error'];
                return ReactDOM.createPortal(
                    <>
                        {states.map(s => (
                            <button key={s} className={state === s ? 'active' : ''} onClick={() => setState(s)}>
                                {s.toUpperCase()}
                            </button>
                        ))}
                        <button className={isHovered ? 'active' : ''} onClick={() => setIsHovered(!isHovered)} style={{marginLeft: '10px'}}>
                            HOVER MOCK
                        </button>
                    </>,
                    document.getElementById('btn-container')
                );
            };

            const isExpanded = state !== 'idle' || isHovered;
            const stateLabels = { idle: 'Aguardando', listening: 'Ouvindo', finalizing: 'Processando', injecting: 'Injetando', success: 'Concluído', error: 'Falhou' };

            return (
                <div className="hud-root">
                    {renderControls()}
                    <div className="hud-stage">
                        <div className={`hud-frame state-${state} ${isExpanded ? 'expanded' : ''}`}>

                            <div
                                className={`hud-pill state-${state} ${isExpanded ? 'expanded' : ''}`}
                                onMouseEnter={() => state === 'idle' && setIsHovered(true)}
                                onMouseLeave={() => setIsHovered(false)}
                            >
                                {/* PONTO CRÍTICO: Um único container de microfone. Sem re-renders, sem quebra de fluxo. */}
                                <div className="hud-mic-container">
                                    <div className="hud-mic"><IconMic state={state} /></div>
                                </div>

                                {/* PONTO CRÍTICO: Wrapper oculto dita o crescimento total da pílula. */}
                                <div className="pill-content-wrapper">
                                    <span className="hud-label-compact">{stateLabels[state] || state}</span>
                                    <Visualizer state={state} />
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
