name: Feature request
description: Propose a focused product or developer-experience improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. List other approaches and why they fall short.
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Note platform limits, privacy concerns, or Azure-specific constraints if relevant.
